services:
  mysql:
    image: mysql:8.0
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: storage-importer-db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "34002:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  storage-importer:
    build:
      context: ./storage-importer
      dockerfile: Dockerfile
    environment:
      MYSQL_DSN: "${MYSQL_DSN}"
      R2_BUCKET: "${R2_BUCKET}"
      R2_ACCESS_KEY: "${R2_ACCESS_KEY}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY}"
      R2_ENDPOINT: "${R2_ENDPOINT}"
      WORKERS: "1"
      CLEAR_FILES_PATH: "false"

    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "34206:9090" # metrics
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/readyz >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 30

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "34200:9090"
    depends_on:
      - storage-importer

volumes:
  mysql_data: